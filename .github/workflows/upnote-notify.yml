# upnote-notify.yml -- Trigger notification when controller notes are updated.
# Fires on: push to controller-note/ paths,
# or via repository_dispatch event from agents.
#
# Part of CTRL-005 Controller-Note Communication Protocol.

name: Upnote Notification

on:
  push:
    paths:
      - 'controller-note/*-upnote.md'
      - 'controller-note/controller-upnote.md'
      - 'controller-note/controller-remote-note.md'
    branches:
      - main

  repository_dispatch:
    types:
      - upnote-updated

permissions:
  issues: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: controller-note
          sparse-checkout-cone-mode: true

      - name: Read latest upnote entry
        id: read-note
        run: |
          # Extract the first entry (between first and second ---)
          ENTRY=$(sed -n '/^## \[/,/^---$/p' controller-note/controller-upnote.md | head -20)
          echo "entry<<EOF" >> $GITHUB_OUTPUT
          echo "$ENTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Extract just the title line
          TITLE=$(grep -m1 '^## \[' controller-note/controller-upnote.md | sed 's/^## //')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Create notification issue
        uses: actions/github-script@v7
        env:
          NOTE_TITLE: ${{ steps.read-note.outputs.title }}
          NOTE_ENTRY: ${{ steps.read-note.outputs.entry }}
        with:
          script: |
            // On repository_dispatch, use payload fields; on push, use upnote content
            const isDispatch = context.eventName === 'repository_dispatch';
            const subject = isDispatch
              ? (context.payload.client_payload?.subject || 'New upnote')
              : (process.env.NOTE_TITLE || 'New upnote pushed');
            const title = `[CTRL-005] ${subject}`;
            const bodyContent = isDispatch
              ? (context.payload.client_payload?.body || 'Check controller-note/controller-upnote.md for details.')
              : (process.env.NOTE_ENTRY || 'Check controller-note/controller-upnote.md for details.');
            const source = isDispatch
              ? (context.payload.client_payload?.source || 'Controller')
              : `push by ${context.actor}`;
            const noteType = isDispatch
              ? (context.payload.client_payload?.note_type || 'update')
              : 'push';
            const body = [
              `**Source:** ${source}`,
              `**Type:** ${noteType}`,
              '',
              bodyContent,
              '',
              '---',
              '*Auto-generated by CTRL-005 upnote-notify workflow*'
            ].join('\n');
            // Dedup: skip if an open issue with the same title already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ctrl-005',
              per_page: 50,
            });
            if (existing.data.some(i => i.title === title)) {
              core.info(`Dedup: open issue "${title}" already exists — skipping create`);
              return;
            }
            // Ensure labels exist before assigning
            for (const label of ['ctrl-005', 'auto-notify']) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: label
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: label === 'ctrl-005' ? '0075ca' : 'd876e3'
                });
              }
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['ctrl-005', 'auto-notify']
            });

      - name: Summary
        env:
          NOTE_ENTRY: ${{ steps.read-note.outputs.entry }}
          TRIGGER: ${{ github.event_name }}
        run: |
          {
            echo "## Upnote Notification"
            echo ""
            echo "**Trigger:** $TRIGGER"
            echo ""
            echo "$NOTE_ENTRY"
          } >> "$GITHUB_STEP_SUMMARY"
